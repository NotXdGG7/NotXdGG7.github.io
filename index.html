<!DOCTYPE html>
<html>
<head>
  <title>NotXdGG</title>
  <link rel="stylesheet" href="style.css">

  <link rel="icon" href="images/favicon.png" sizes="32x32">
  <link rel="icon" href="images/favicon.png" sizes="16x16">
</head>
<body>

<header>
  <div class="logo">
    <a href="index.html" class="logo-wrap">
      <img src="images/logo.png" class="logo-img" alt="logo">
      <span class="crown">👑</span>
    </a>
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="portfolio.html">Portfolio</a>
    <a href="experience.html">Experience</a>
    <a href="feedback.html">Feedback</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<section class="hero">
  <h1>Hi, I'm NotXdGG</h1>
  <p>Minecraft Developer & Web Designer creating high-performance systems.</p>

  <div class="hero-buttons">
    <a href="portfolio.html" class="btn primary">View Work</a>
    <a href="contact.html" class="btn secondary">Contact</a>
  </div>

  <div class="stats">
    <div class="stat">
      <h2 class="counter" data-target="20">0</h2>
      <span>👥 Clients</span>
    </div>
    <div class="stat">
      <h2 class="counter" data-target="128">0</h2>
      <span>⭐ Reviews</span>
    </div>
  </div>
</section>

<script>
document.querySelectorAll('.counter').forEach(c=>{
  const update=()=>{
    let t=+c.dataset.target, n=+c.innerText;
    let inc=t/40;
    if(n<t){
      c.innerText=Math.ceil(n+inc);
      setTimeout(update,30);
    } else {
      c.innerText=t+(t==20?"+":"");
    }
  };
  update();
});
</script>

</body>
</html>
